<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 贪吃蛇</title>
<style>
body{margin:0;padding:20px;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#1a1a2e;font-family:"Microsoft YaHei",sans-serif}
.game-wrapper{text-align:center}
h2{color:#7c5cfc;margin-bottom:10px}
canvas{border:2px solid #7c5cfc;border-radius:4px;background:#0f0f1a}
.info{color:#aaa;margin-top:10px;font-size:14px}
.score{color:#4ade80;font-size:20px;margin-bottom:8px}
</style>
</head>
<body>
<div class="game-wrapper">
<h2>🐍 贪吃蛇</h2>
<div class="score">分数: <span id="score">0</span></div>
<canvas id="canvas" width="400" height="400"></canvas>
<div class="info">⬆⬇⬅➡ 方向键 | 空格暂停</div>
</div>
<script>
(function(){
var c=document.getElementById("canvas");
var x=c.getContext("2d");
var g=20,w=c.width/g,h=c.height/g;
var s,d,nd,p,food,loop,run,paused;

function init(){
 s=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
 d={x:1,y:0};nd={x:1,y:0};
 p=0;run=true;paused=false;
 document.getElementById("score").textContent=p;
 spawnFood();
 if(loop)clearInterval(loop);
 loop=setInterval(step,100);
}

function spawnFood(){
 do{food={x:Math.floor(Math.random()*w),y:Math.floor(Math.random()*h)}}
 while(s.some(function(t){return t.x===food.x&&t.y===food.y}));
}

function step(){
 if(!run||paused)return;
 d=nd;
 var head={x:s[0].x+d.x,y:s[0].y+d.y};
 if(head.x<0||head.x>=w||head.y<0||head.y>=h){gameOver();return;}
 if(s.some(function(t){return t.x===head.x&&t.y===head.y})){gameOver();return;}
 s.unshift(head);
 if(head.x===food.x&&head.y===food.y){p++;document.getElementById("score").textContent=p;spawnFood();}
 else{s.pop();}
 draw();
}

function gameOver(){
 run=false;clearInterval(loop);draw();
 x.fillStyle="rgba(0,0,0,0.6)";
 x.fillRect(0,0,c.width,c.height);
 x.fillStyle="#fff";x.font="22px Microsoft YaHei";x.textAlign="center";
 x.fillText("游戏结束！按空格重新开始",c.width/2,c.height/2);x.textAlign="start";
}

function draw(){
 x.clearRect(0,0,c.width,c.height);
 x.strokeStyle="#1a1a30";x.lineWidth=0.5;
 for(var i=0;i<=w;i++){x.beginPath();x.moveTo(i*g,0);x.lineTo(i*g,c.height);x.stroke();}
 for(var j=0;j<=h;j++){x.beginPath();x.moveTo(0,j*g);x.lineTo(c.width,j*g);x.stroke();}
 s.forEach(function(t,i){
  var v=i===0?200:Math.max(0,200-i*10);
  x.fillStyle="rgb(100,"+v+",100)";
  x.fillRect(t.x*g+1,t.y*g+1,g-2,g-2);
 });
 x.fillStyle="#f87171";x.beginPath();
 var cx=food.x*g+g/2,cy=food.y*g+g/2;
 x.arc(cx,cy,g/2-2,0,Math.PI*2);x.fill();
}

document.addEventListener("keydown",function(e){
 if(!run){if(e.keyCode===32)init();return;}
 if(e.keyCode===37&&d.x!==1)nd={x:-1,y:0};
 if(e.keyCode===38&&d.y!==1)nd={x:0,y:-1};
 if(e.keyCode===39&&d.x!==-1)nd={x:1,y:0};
 if(e.keyCode===40&&d.y!==-1)nd={x:0,y:1};
 if(e.keyCode===32){paused=!paused;draw();}
});

init();draw();
})();
</script>
</body>
</html>
