<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 贪吃蛇</title>
<style>
body {
  margin: 0; padding: 20px;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; background: #1a1a2e;
  font-family: "Microsoft YaHei", sans-serif;
}
.game-wrapper {
  text-align: center;
}
h2 { color: #7c5cfc; margin-bottom: 10px; }
canvas {
  border: 2px solid #7c5cfc;
  border-radius: 4px;
  background: #0f0f1a;
}
.info { color: #aaa; margin-top: 10px; font-size: 14px; }
.score { color: #4ade80; font-size: 20px; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="game-wrapper">
  <h2>🐍 贪吃蛇</h2>
  <div class="score">分数: <span id="score">0</span></div>
  <canvas id="canvas" width="400" height="400"></canvas>
  <div class="info">方向键控制 | 空格暂停/继续</div>
</div>

<script>
var canvas = document.getElementById("canvas");
var ctx = canvas.getContext("2d");

var gridSize = 20;
var cols = canvas.width / gridSize;
var rows = canvas.height / gridSize;

var snake, food, direction, nextDirection, score, gameLoop, running, paused;

function init() {
  snake = [{x:10, y:10}, {x:9, y:10}, {x:8, y:10}];
  direction = {x:1, y:0};
  nextDirection = {x:1, y:0};
  score = 0;
  running = true;
  paused = false;
  document.getElementById("score").textContent = score;
  spawnFood();
  if (gameLoop) clearInterval(gameLoop);
  gameLoop = setInterval(step, 100);
}

function spawnFood() {
  do {
    food = {
      x: Math.floor(Math.random() * cols),
      y: Math.floor(Math.random() * rows)
    };
  } while (snake.some(function(s){ return s.x === food.x && s.y === food.y; }));
}

function step() {
  if (!running || paused) return;
  direction = nextDirection;
  var head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};

  if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) { gameOver(); return; }
  if (snake.some(function(s){ return s.x === head.x && s.y === head.y; })) { gameOver(); return; }

  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score++;
    document.getElementById("score").textContent = score;
    spawnFood();
  } else {
    snake.pop();
  }
  draw();
}

function gameOver() {
  running = false;
  clearInterval(gameLoop);
  draw();
  ctx.fillStyle = "rgba(0,0,0,0.6)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#fff";
  ctx.font = "22px Microsoft YaHei";
  ctx.textAlign = "center";
  ctx.fillText("游戏结束！按空格重新开始", canvas.width/2, canvas.height/2);
  ctx.textAlign = "start";
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw grid lines
  ctx.strokeStyle = "#1a1a30";
  ctx.lineWidth = 0.5;
  for (var i = 0; i <= cols; i++) {
    ctx.beginPath(); ctx.moveTo(i*gridSize, 0); ctx.lineTo(i*gridSize, canvas.height); ctx.stroke();
  }
  for (var j = 0; j <= rows; j++) {
    ctx.beginPath(); ctx.moveTo(0, j*gridSize); ctx.lineTo(canvas.width, j*gridSize); ctx.stroke();
  }

  // Draw snake
  snake.forEach(function(s, i) {
    var g = i === 0 ? 200 : Math.max(0, 200 - i * 10);
    ctx.fillStyle = "rgb(100," + g + ",100)";
    ctx.fillRect(s.x*gridSize + 1, s.y*gridSize + 1, gridSize - 2, gridSize - 2);
  });

  // Draw food
  ctx.fillStyle = "#f87171";
  ctx.beginPath();
  var cx = food.x * gridSize + gridSize/2;
  var cy = food.y * gridSize + gridSize/2;
  ctx.arc(cx, cy, gridSize/2 - 2, 0, Math.PI * 2);
  ctx.fill();
}

document.addEventListener("keydown", function(e) {
  if (!running) {
    if (e.keyCode === 32) init();
    return;
  }
  if (e.keyCode === 37 && direction.x !== 1) nextDirection = {x:-1, y:0};
  if (e.keyCode === 38 && direction.y !== 1) nextDirection = {x:0, y:-1};
  if (e.keyCode === 39 && direction.x !== -1) nextDirection = {x:1, y:0};
  if (e.keyCode === 40 && direction.y !== -1) nextDirection = {x:0, y:1};
  if (e.keyCode === 32) { paused = !paused; draw(); }
});

init();
draw();
</script>
</body>
</html>
